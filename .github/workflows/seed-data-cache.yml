# One-off cache seeding for the scheduled retrain workflow.
# workflow_dispatch only — never runs on a schedule. Run this
# ONCE before the first real run of retrain.yml, and again any time you
# want to replace the cached data/ tree with a fresh manual snapshot (e.g.
# after a cache eviction, or a large manual data/ rebuild locally) — though
# note retrain.yml (as of the release-fallback fix) now recovers from a
# cache eviction automatically; this workflow is for an EXPLICIT re-seed
# from a newly-rebuilt local data/ tree, not routine eviction recovery.
#
# Reads data/ from a GitHub Release asset via the shared
# .github/actions/restore-data-seed composite action — never from a
# committed branch — data/ stays gitignored and never touches ANY
# branch's git history, main or otherwise. See docs/retrain_workflow_setup.md
# for the exact commands to create/update that release asset from your
# local data/ tree before running this.

name: Seed data/ cache

on:
  workflow_dispatch: {}

jobs:
  seed:
    name: Download data/ snapshot and populate the retrain cache
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore data/ from the data-seed release asset
        uses: ./.github/actions/restore-data-seed
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Same CACHE KEY SCHEME as retrain.yml (read the note at the top of
      # that file first): a unique key so this save always succeeds
      # (never tries to overwrite an existing, immutable cache entry),
      # sharing retrain.yml's "f1-data-" prefix so ITS very first
      # restore-keys lookup finds this entry.
      - name: Save to the shared data/ cache
        uses: actions/cache/save@v4
        with:
          path: data/
          key: f1-data-seed-${{ github.run_id }}
