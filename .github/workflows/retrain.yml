# Scheduled retrain — automation
# layered on top of the promotion gate and the model-class gate.
# Separate from ci.yml on purpose: this workflow never
# runs on push/PR, only on a schedule or manual dispatch, and it is the
# only workflow in this repo allowed to open a PR against main.
#
# `data/` IS EVENTUALLY CONSISTENT, NOT PERMANENT — read before touching
# the restore/fallback steps below:
# `data/` is entirely gitignored and does not exist on a fresh
# GitHub-hosted runner checkout, but scripts/ingest_jolpica.py requires
# the existing data/*.csv files to already be present (it only backfills
# races MISSING from them — it is not a full-history bootstrap, and a
# full historical pull would need ~4,700 jolpica-f1 requests against its
# 200/hour unauthenticated rate limit, over 24 hours, wildly impractical
# for a weekly job). This workflow persists data/ across runs via a
# GitHub Actions cache — but GitHub evicts cache entries unused for
# ~7 days, the SAME interval as this workflow's own weekly schedule,
# leaving no margin against ordinary scheduling jitter. A real production
# incident (2026-07-20) confirmed this: four consecutive weekly runs
# restored/re-saved the cache successfully, then the fifth found the
# entire `f1-data-` prefix evicted and the job hard-failed. Root cause
# and the rejected alternative (a periodic re-seed on a timer, which
# would have silently rolled back real ingested progress) are recorded in
# `context/decisions.md`'s ADR for this incident.
#
# THE FIX: this workflow now SELF-HEALS on a cache miss. "Restore data/
# cache" below is unchanged and stays the fast path on every normal week.
# If it comes back empty, "Check whether data/ actually restored" detects
# that (by file presence, not the cache-hit output — see note there) and
# the "Fall back to the data-seed release asset" step recovers data/ from
# the SAME durable GitHub Release asset `.github/workflows/seed-data-
# cache.yml` uses (GitHub Releases don't expire the way Action cache
# entries do), via the shared `.github/actions/restore-data-seed`
# composite action. `ingest_jolpica.py` itself is untouched — the
# fallback only ever hands it the same kind of existing data/ tree it
# already expects; catching up on however many weeks elapsed since the
# release snapshot was built is well within its normal incremental-backfill
# contract for any realistic gap (a few races, not thousands of requests).
# `seed-data-cache.yml` remains the tool for an EXPLICIT re-seed from a
# freshly-rebuilt local data/ tree — this fallback is for unattended
# eviction recovery only, not a replacement for it.
#
# CACHE KEY SCHEME (read this before touching either cache step below):
# GitHub Actions cache entries are IMMUTABLE once created under an exact
# key — actions/cache/save silently no-ops (does not update, does not
# error the job) if that exact key already exists. A single fixed key used
# for both restore AND save would therefore only ever really populate ONCE
# and never grow again. Instead: every run's OWN save key is unique
# (f1-data-<run id>, which by definition cannot already exist), while
# restore uses restore-keys with just the "f1-data-" PREFIX, which matches
# and returns the MOST RECENT entry sharing that prefix — i.e. last week's
# run. seed-data-cache.yml's one-off seed entry (f1-data-seed-<run id>)
# shares the same prefix, so it is exactly what the very first scheduled
# run's restore-keys lookup finds.

name: Scheduled Retrain

on:
  schedule:
    # Monday 06:00 UTC — after any race weekend (F1 races run Fri-Sun).
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

# Never run two retrains concurrently — both would fight over the same
# data/ cache key and could open duplicate PRs.
concurrency:
  group: scheduled-retrain
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  retrain:
    name: Ingest, retrain, gate, PR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .[dev]

      # See the CACHE KEY SCHEME note above the job definition. The `key`
      # here (this run's own id) is guaranteed not to exist yet, so this
      # always falls through to `restore-keys`' prefix match against the
      # most recent previous entry (last week's run, or the one-off seed).
      - name: Restore data/ cache
        id: data-cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: f1-data-${{ github.run_id }}
          restore-keys: |
            f1-data-

      # Checked by FILE PRESENCE, not the restore step's own `cache-hit`
      # output: `cache-hit` is only ever `true` on an EXACT match of the
      # primary `key`, which here is this run's own (guaranteed-unused)
      # id — so it reads `false` even on a perfectly healthy week where
      # `restore-keys` found last week's entry. File presence is the
      # actual signal that matters: did data/ land or not.
      - name: Check whether data/ actually restored
        id: data-check
        run: |
          if [ -f data/races.csv ]; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "::warning::data/ Actions cache (key prefix f1-data-) was empty or evicted — falling back to the data-seed release asset instead of failing. ingest_jolpica.py will backfill anything missing since that snapshot was built. If this keeps happening, GitHub's ~7-day cache eviction may be racing this workflow's own weekly schedule — see docs/retrain_workflow_setup.md and context/decisions.md's ADR for this incident."
          fi

      # Self-healing fallback (see the top-of-file note): recovers data/
      # from the SAME durable release asset seed-data-cache.yml uses.
      # ingest_jolpica.py itself is unmodified — this only ever hands it
      # the same kind of existing data/ tree it already expects. The
      # composite action's own sanity check fails the job loudly (naming
      # the missing file) if the release asset is ALSO somehow broken —
      # that combination (cache evicted AND release asset invalid) is a
      # genuine stop-the-job case, not one this fallback can paper over.
      - name: Fall back to the data-seed release asset (cache miss)
        if: steps.data-check.outputs.restored == 'false'
        uses: ./.github/actions/restore-data-seed
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Snapshot the currently-served bundle's manifest BEFORE anything
      # changes, so the PR body can show a real before/after metrics diff
      # regardless of what promote_model.py does below.
      - name: Snapshot currently-served metrics
        run: |
          if [ -f artifacts/serving/staging/manifest.json ]; then
            cp artifacts/serving/staging/manifest.json /tmp/served_before.json
          else
            echo "{}" > /tmp/served_before.json
          fi

      - name: Ingest + rebuild + freeze (automated — registers only, does not export)
        run: python scripts/refresh_and_freeze.py --automated

      # Part 2 (weekly ingestion visibility gap): the only prior visibility
      # into what got ingested was trusting ingest_jolpica.py's own log
      # lines — nothing genuinely inspectable survived the run. This
      # uploads scripts/ingest_jolpica.py's own write_ingest_report() output
      # (summary.json + the exact new rows fetched this run, per endpoint —
      # never the accumulated data/ tree) as a downloadable CI artifact
      # (`gh run download <run-id>`). if: always() + if-no-files-found: warn
      # so this still captures what ingestion did even if a LATER step in
      # the run above fails (build_dataset, season_tracking, promote, ...)
      # — ingestion itself already completed and wrote its report before
      # any of those could fail.
      - name: Upload ingestion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-report-${{ github.run_id }}
          path: ingest_report/
          if-no-files-found: warn

      # Always re-save, even if a later step fails — the ingestion delta
      # this run fetched should not be re-fetched next week just because
      # promotion was refused. key is this run's own unique id (see the
      # CACHE KEY SCHEME note above), so this save always succeeds — it is
      # never trying to overwrite an existing, immutable cache entry. Runs
      # identically whether data/ came from a normal cache hit or the
      # release-asset fallback above — either way, this saves whatever is
      # actually on disk now, re-establishing a fresh, healthy cache entry
      # so next week's run doesn't need the fallback too.
      - name: Save data/ cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: f1-data-${{ github.run_id }}

      # This PR is
      # DELIBERATELY separate from the model-promotion PR below and has NO
      # `if:` condition tying it to promotion — display data, the runtime
      # features snapshot, and the current-season tracking set are all "current vs.
      # stale" ground-truth data with no quality judgment involved,
      # refreshed unconditionally by refresh_and_freeze.py
      # regardless of whether a candidate is promoted. A single-PR design
      # (gated on promotion) was tried first and found to silently discard
      # this refreshed data on every refused promotion (the normal case)
      # when the runner was torn
      # down — confirmed against real run history — hence the split into
      # two independent PRs.
      #
      # Still human-reviewed like everything else this project pushes to
      # main (not auto-merged) — there is no automated correctness check on
      # this data today (unlike the model bundle's 3 gate checks), so a
      # human glance stays cheap insurance against a bad ingest silently
      # reaching production.
      #
      # `base: main` is set explicitly on BOTH this step and the
      # promotion-gated step below (not left to the action's "whatever's
      # currently checked out" default) — per peter-evans/create-pull-
      # request's own "Providing a consistent base" guidance, this removes
      # any dependency on what running the action here first may do to the
      # workspace's checked-out ref before the second one runs.
      - name: "Open PR: refresh display data, features snapshot, tracking set (always, independent of promotion)"
        id: data_refresh_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          commit-message: "chore: scheduled data refresh — display data, features snapshot, season tracking"
          branch: scheduled-retrain/data-refresh
          delete-branch: true
          title: "Scheduled data refresh: display data, features snapshot, season tracking"
          add-paths: |
            artifacts/display/
            artifacts/features.parquet
            artifacts/tracking/
          body: |
            Automated weekly refresh of ground-truth data — independent of
            whether a new model candidate is promoted this run (see the
            separate, gated PR for that, opened only when promotion
            succeeds). No model-quality judgment involved here, only
            "current vs. stale":

            - `artifacts/display/` — dashboard names/results/standings
            - `artifacts/features.parquet` — runtime feature snapshot (which
              races/drivers exist; orthogonal to which model version serves
              them)
            - `artifacts/tracking/` — current-era continuous tracking set
              (`src/models/season_tracking.py`)

      # Never lets a refusal fail the JOB — captured explicitly so the
      # steps below can react (PR vs. clean "nothing to review" stop)
      # rather than the job just going red with no explanation.
      - name: Promote (gated — metric-regression + model-class checks)
        run: |
          set +e
          python scripts/promote_model.py --alias Staging 2>&1 | tee /tmp/promote_output.txt
          echo "PROMOTE_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Report refusal and stop (no PR)
        if: env.PROMOTE_EXIT_CODE != '0'
        run: |
          echo "::warning::Promotion refused — see the reason below. No PR opened; artifacts/serving/ is untouched."
          cat /tmp/promote_output.txt
          exit 0

      - name: Build metrics-diff summary
        if: env.PROMOTE_EXIT_CODE == '0'
        run: |
          python - <<'PYEOF'
          import json

          before = json.load(open("/tmp/served_before.json"))
          after = json.load(open("artifacts/serving/staging/manifest.json"))
          before_metrics, after_metrics = before.get("metrics", {}), after.get("metrics", {})

          keys = ["top1_accuracy", "top3_recall", "winner_mrr", "spearman_corr",
                  "log_loss", "brier_score", "ece"]
          lines = ["| Metric | Previously served | New candidate | Delta |",
                   "|---|---|---|---|"]
          for key in keys:
              b, a = before_metrics.get(key), after_metrics.get(key)
              if a is None:
                  continue
              b_str = f"{b:.4f}" if isinstance(b, (int, float)) else "—"
              delta = f"{a - b:+.4f}" if isinstance(b, (int, float)) else "—"
              lines.append(f"| {key} | {b_str} | {a:.4f} | {delta} |")

          summary = "\n".join(lines)
          print(summary)
          with open("/tmp/metrics_diff.md", "w") as f:
              f.write(summary)
          PYEOF

      # add-paths is narrowed to JUST artifacts/serving/ —
      # display data, the features snapshot, and the tracking set already
      # traveled (unconditionally) in their own PR above, so this PR is
      # purely the model-quality-gated artifact. This is a deliberate split
      # from an earlier single-PR "everything travels together" design:
      # that design's real failure mode was a HUMAN forgetting to run one
      # of two independent MANUAL commands together — a failure mode this
      # fully-automated pipeline (refresh_and_freeze.py always runs both
      # refreshes, every run, in the same process) cannot reproduce — only
      # WHICH of the two deterministic outputs gets gated on push changes
      # here, not whether both get produced. The genuine coupling that
      # matters (a model bundle staying consistent with its own
      # manifest/schema) lives entirely inside artifacts/serving/<alias>/,
      # untouched by this split. `base: main` set explicitly — see the note
      # on the PR step above.
      - name: Open PR with the promoted candidate
        if: env.PROMOTE_EXIT_CODE == '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          commit-message: "chore: scheduled retrain — promote new candidate to Staging"
          branch: scheduled-retrain/staging
          delete-branch: true
          title: "Scheduled retrain: new candidate promoted to Staging"
          add-paths: artifacts/serving/
          body-path: /tmp/metrics_diff.md
